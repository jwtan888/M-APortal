name: Sync DFM From OneDrive

  on:
    repository_dispatch:
      types: [sync_onedrive]
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    sync:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Download latest Excel from OneDrive
          run: |
            curl -L "${{ secrets.ONEDRIVE_DFMXLSX_URL }}" -o "dfm-dashboard/DFM 2026.xlsx"
            ls -lh "dfm-dashboard/DFM 2026.xlsx"
            file "dfm-dashboard/DFM 2026.xlsx"
            python3 - <<'PY'
            from pathlib import Path
            p = Path("dfm-dashboard/DFM 2026.xlsx")
            data = p.read_bytes()[:300]
            print(data.decode("utf-8", errors="ignore"))
            PY

        - name: Rebuild dashboard seed data
          run: python3 "dfm-dashboard/scripts/build_seed_data.py"

        - name: Commit updated dashboard data
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "dfm-dashboard/DFM 2026.xlsx" "dfm-dashboard/seed-data.js"
            git diff --cached --quiet && exit 0
            git commit -m "Sync DFM data from OneDrive"
            git push
